<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRUX YT | SUPREME EDITION</title>
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00d2ff;
            --glass: rgba(10, 15, 30, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: #010108; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            position: relative;
        }

        /* --- GALAXY & FLOATING ASSETS --- */
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; opacity: 0.6; }
        
        .bg-element { position: absolute; z-index: 2; pointer-events: none; opacity: 0.8; }
        
        /* Sunflowers (1000056230.jpg) */
        .flower-1 { top: 10%; left: 5%; width: 120px; filter: hue-rotate(280deg); animation: float 8s infinite ease-in-out; }
        .flower-2 { bottom: 15%; right: 10%; width: 100px; filter: hue-rotate(200deg); animation: float 10s infinite ease-in-out reverse; }
        
        /* Butterfly (1000056231.jpg) */
        .butterfly { top: 20%; right: 20%; width: 70px; animation: fly 6s infinite ease-in-out; }

        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-30px) rotate(15deg); } }
        @keyframes fly { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(50px, -50px) scale(1.2); } }

        /* --- AI GIRL MASCOT (1000056229.jpg) --- */
        .mascot-wrap {
            position: fixed; bottom: -10px; right: 0; width: 350px; z-index: 100;
            animation: mascotWave 4s infinite ease-in-out;
            filter: drop-shadow(0 0 25px var(--neon-pink));
        }
        .mascot-wrap img { width: 100%; }

        /* Speech Bubble */
        .bubble {
            position: absolute; top: 15%; left: -40%; background: #fff; color: #000;
            padding: 12px 20px; border-radius: 20px; font-size: 11px; font-weight: 900;
            display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 101;
        }

        /* --- MAIN DASHBOARD (Look like Image 1000056233.jpg) --- */
        .dashboard {
            width: 90%; max-width: 500px; background: var(--glass);
            border: 2px solid rgba(0, 210, 255, 0.3); border-radius: 25px;
            padding: 40px; backdrop-filter: blur(30px); z-index: 50;
            box-shadow: 0 0 50px rgba(0,0,0,1); text-align: center;
        }

        .title {
            font-size: 38px; font-weight: 900; letter-spacing: 6px;
            background: linear-gradient(to right, #fff, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 30px; text-transform: uppercase;
        }

        input {
            width: 100%; padding: 18px; background: rgba(0,0,0,0.7);
            border: 1px solid var(--neon-pink); border-radius: 15px;
            color: #00ffff; text-align: center; margin-bottom: 25px; outline: none;
            font-weight: bold; font-family: monospace;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn {
            padding: 18px; border-radius: 12px; border: none; font-weight: 900;
            text-transform: uppercase; cursor: pointer; transition: 0.3s; font-size: 11px;
        }
        .btn-ana { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px rgba(0, 210, 255, 0.4); }
        .btn-can { background: transparent; border: 2px solid var(--neon-pink); color: var(--neon-pink); }
        .btn-can:hover { background: var(--neon-pink); color: #fff; box-shadow: 0 0 25px var(--neon-pink); }

        #output-area { display: none; margin-top: 30px; animation: fadeIn 0.5s ease; }
        .data-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--neon-blue); text-align: left; }
        .json-viewer { background: #000; padding: 15px; border-radius: 10px; font-size: 10px; color: #00ff88; max-height: 120px; overflow-y: auto; text-align: left; border: 1px solid #222; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes mascotWave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>

<div id="particles-js"></div>

<img src="1000056230.jpg" class="bg-element flower-1" alt="flower">
<img src="1000056230.jpg" class="bg-element flower-2" alt="flower">
<img src="1000056231.jpg" class="bg-element butterfly" alt="butterfly">

<div class="mascot-wrap">
    <div class="bubble" id="msg">Processing...</div>
    <img src="1000056229.jpg" alt="Mascot">
</div>

<div class="dashboard">
    <div class="title">FRUX YT</div>
    
    <input type="text" id="token" placeholder="ENTER ACCESS TOKEN">

    <div class="btn-group">
        <button class="btn btn-ana" onclick="fire('scan')">Analysis</button>
        <button class="btn btn-can" onclick="fire('cancel')">Pending Cancel</button>
    </div>

    <div id="output-area">
        <div class="data-card">
            <span style="font-size: 10px; color: #888;">CURRENT BIND</span><br>
            <span id="v-mail" style="font-weight: bold;">...</span>
        </div>
        <div class="data-card" id="p-box">
            <span style="font-size: 10px; color: #888;">PENDING REQUEST</span><br>
            <span id="v-pend" style="font-weight: bold;">...</span>
        </div>
        <div class="json-viewer">
            <pre id="v-raw">Waiting for data...</pre>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    particlesJS("particles-js", { "particles": { "number": { "value": 60 }, "move": { "enable": true, "speed": 1.5 }, "size": { "value": 2 } } });

    function say(txt) {
        const b = document.getElementById('msg');
        b.innerText = txt; b.style.display = 'block';
        setTimeout(() => b.style.display = 'none', 3500);
    }

    async function fire(mode) {
        const tk = document.getElementById('token').value;
        if(!tk) { say("Token dalo bhai!"); return; }

        say(mode === 'scan' ? "Analyzing..." : "Sending Cancel Command!");

        const ep = mode === 'scan' ? 'get_bind_info' : 'cancel_request';
        const meth = mode === 'scan' ? 'GET' : 'POST';

        try {
            // Netlify proxy request
            const res = await fetch(`/api/game/account_security/bind:${ep}?app_id=100067&access_token=${tk}`, {
                method: meth,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            const d = await res.json();

            document.getElementById('v-raw').innerText = JSON.stringify(d, null, 2);
            document.getElementById('v-mail').innerText = d.email || "Clean";
            
            const p = d.email_to_be_bind || d.email_to_be || "null";
            const vp = document.getElementById('v-pend');
            const pb = document.getElementById('p-box');

            if(p !== "null") {
                vp.innerText = p; vp.style.color = "#ff007f"; pb.style.borderLeftColor = "#ff007f";
                say("Hacker Detected!");
            } else {
                vp.innerText = "NO PENDING"; vp.style.color = "#00ff88"; pb.style.borderLeftColor = "#00ff88";
                say("Safe Account!");
            }

            document.getElementById('output-area').style.display = 'block';
            if(mode === 'cancel') { alert("CANCEL DONE!"); fire('scan'); }
        } catch (e) {
            say("Network Error!");
        }
    }
</script>
</body>
</html>
